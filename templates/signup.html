<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Signup — ResumeIQ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="app-shell">

  <!-- HEADER -->
  <header class="site-header">
    <div class="logo">
      <span class="logo-mark">R</span>
      <span class="logo-text">ResumeIQ</span>
    </div>

    <div style="display:flex; gap:10px; align-items:center;">
      <button id="themeToggle" class="theme-toggle">🌙</button>
      <a href="/" class="btn btn-secondary">← Back</a>
    </div>
  </header>

  <!-- SIGNUP CARD -->
  <div class="auth-page">

    <h2>🚀 Create Account</h2>
    <p style="color: var(--text-secondary); font-size: 14px;">
      Start your AI-powered resume journey
    </p>

    <input type="text" id="name" placeholder="Enter your name" required>
    <input type="email" id="email" placeholder="Enter your email" required>
    <input type="password" id="password" placeholder="Create password" required>

    <button onclick="signup()" class="btn btn-primary">Sign Up</button>

    <p style="font-size: 14px;">
      Already have an account?
      <a href="/login-page" style="color: var(--accent);">Login</a>
    </p>

  </div>

</div>

<!-- SCRIPT -->
<script>

// 🌙 THEME FIX
const toggle = document.getElementById("themeToggle");

if(localStorage.getItem("theme") === "dark"){
  document.body.classList.add("dark-mode");
}

toggle.onclick = () => {
  document.body.classList.toggle("dark-mode");
  localStorage.setItem("theme", document.body.classList.contains("dark-mode") ? "dark" : "light");
};


// 🚀 SIGNUP FUNCTION
async function signup() {
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!name || !email || !password) {
    alert("⚠️ Please fill all fields");
    return;
  }

  try {
    const res = await fetch("/signup", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ name, email, password })
    });

    const data = await res.json();

    if (!res.ok) {
      alert(data.error || "Signup failed");
      return;
    }

    alert("✅ Signup successful! Please login.");

    // Redirect to login
    window.location.href = "/login-page";

  } catch (err) {
    alert("❌ Error: " + err.message);
  }
}

</script>

</body>
</html>
