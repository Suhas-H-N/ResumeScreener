<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ResumeIQ — AI Resume Screener</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="bg-grid"></div>
<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>

<div class="app-shell">

  <!-- HEADER -->
  <header class="site-header">
    <div class="logo">
      <span class="logo-mark">R</span>
      <span class="logo-text">ResumeIQ</span>
    </div>

    <div class="header-right">
      <p class="tagline">AI-powered resume screening & ATS analysis</p>

      <div class="auth-buttons">
        <span id="welcomeUser"></span>
        <a href="/login-page" class="btn btn-secondary">Login</a>
        <a href="/signup-page" class="btn btn-primary">Get Started</a>
      </div>

      <button id="themeToggle" class="theme-toggle">🌙</button>
    </div>
  </header>

  <!-- MAIN -->
  <main>
    <div class="layout">

      <!-- LEFT -->
      <section class="panel panel-input">

        <div class="panel-header">
          <span class="step-badge">01</span>
          <h2>Upload Resume</h2>
        </div>

        <form id="screeningForm">

          <!-- Upload -->
          <div class="field-group">
            <label class="field-label">Resume File</label>

            <div class="upload-zone">
              <input type="file" id="resumeFile" name="resume_file" class="file-input" accept=".pdf,.docx,.txt">

              <label for="resumeFile" class="upload-label">
                <span>Drop your resume here</span>
              </label>

              <p id="fileNameDisplay" style="color: var(--accent);" hidden></p>
            </div>
          </div>

          <!-- Paste -->
          <div class="field-group">
            <label class="field-label">Or Paste Resume</label>
            <textarea id="resumeText" name="resume_text" class="jd-textarea"></textarea>
          </div>

          <!-- JD -->
          <div class="field-group">
            <div class="panel-header">
              <span class="step-badge">02</span>
              <h2>Job Description</h2>
            </div>

            <textarea id="jobDescription" name="job_description" class="jd-textarea"></textarea>
          </div>

          <button type="submit" class="analyze-btn">Analyze Resume →</button>

        </form>
      </section>

      <!-- RIGHT -->
      <section class="panel panel-results">

        <div id="emptyState" class="empty-state">
          <p>Results will appear here</p>
        </div>

        <div id="loader" hidden>
          <p>Analyzing...</p>
        </div>

        <div id="resultsContent" hidden>

          <h2>Analysis Report</h2>

          <!-- Scores -->
          <div class="scores-row">
            <div class="score-tile">
              <h3>Match</h3>
              <span id="matchScore">0%</span>
            </div>

            <div class="score-tile">
              <h3>ATS</h3>
              <span id="atsScore">0%</span>
            </div>

            <div class="score-tile">
              <h3>Level</h3>
              <span id="matchLevel">-</span>
            </div>
          </div>

          <!-- Keywords -->
          <div class="kw-grid">
            <div>
              <h4>Matching</h4>
              <div id="matchingKeywords"></div>
            </div>

            <div>
              <h4>Missing</h4>
              <div id="missingKeywords"></div>
            </div>
          </div>

          <!-- 🔥 NEW SKILLS SECTION -->
          <div class="kw-grid">
            <div>
              <h4>Detected Skills</h4>
              <div id="resumeSkills"></div>
            </div>

            <div>
              <h4>Missing Skills</h4>
              <div id="missingSkills"></div>
            </div>
          </div>

        </div>

      </section>

    </div>
  </main>

  <footer class="site-footer">
    <p>Built by Suhas 🚀</p>
  </footer>

</div>

<script>

// Theme
const toggle = document.getElementById("themeToggle");

if(localStorage.getItem("theme")==="light"){
  document.body.classList.add("light");
}

toggle.onclick = () => {
  document.body.classList.toggle("light");
  localStorage.setItem("theme", document.body.classList.contains("light") ? "light" : "dark");
};

// Welcome
const user = localStorage.getItem("user");
if(user){
  document.getElementById("welcomeUser").textContent = "Welcome, " + user;
}

// File
document.getElementById("resumeFile").addEventListener("change", e=>{
  const name = e.target.files[0]?.name;
  const display = document.getElementById("fileNameDisplay");

  if(name){
    display.textContent = name;
    display.hidden = false;
  }
});

// Submit
document.getElementById("screeningForm").addEventListener("submit", async e=>{
  e.preventDefault();

  document.getElementById("loader").hidden = false;
  document.getElementById("emptyState").hidden = true;
  document.getElementById("resultsContent").hidden = true;

  const formData = new FormData(e.target);

  try {
    const res = await fetch("/analyze", {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    document.getElementById("loader").hidden = true;

    if(data.error){
      alert(data.error);
      return;
    }

    document.getElementById("resultsContent").hidden = false;

    document.getElementById("matchScore").textContent = data.match_score + "%";
    document.getElementById("atsScore").textContent = data.ats_score + "%";
    document.getElementById("matchLevel").textContent = data.match_level;

    document.getElementById("matchingKeywords").innerHTML =
      data.matching_keywords.map(k => `<span>${k}</span>`).join("");

    document.getElementById("missingKeywords").innerHTML =
      data.missing_keywords.map(k => `<span>${k}</span>`).join("");

    // SAFE SKILLS
    const resumeSkillsEl = document.getElementById("resumeSkills");
    const missingSkillsEl = document.getElementById("missingSkills");

    if(resumeSkillsEl && missingSkillsEl){
      resumeSkillsEl.innerHTML =
        (data.resume_skills || []).map(s => `<span>${s}</span>`).join("");

      missingSkillsEl.innerHTML =
        (data.missing_skills || []).map(s => `<span>${s}</span>`).join("");
    }

  } catch (err) {
    document.getElementById("loader").hidden = true;
    alert("Error: " + err.message);
  }

});

</script>

</body>
</html>
