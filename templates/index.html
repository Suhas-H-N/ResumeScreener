<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ResumeIQ — AI Resume Screener</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<!-- Background -->
<div class="bg-grid"></div>
<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>

<div class="app-shell">

  <!-- HEADER -->
  <header class="site-header">
    <div class="logo">
      <span class="logo-mark">R</span>
      <span class="logo-text">ResumeIQ</span>
    </div>

    <div class="header-right">
      <p class="tagline">AI-powered resume screening & ATS analysis</p>

      <div class="auth-buttons">
        <span id="welcomeUser"></span>
        <a href="/login-page" class="btn btn-secondary">Login</a>
        <a href="/signup-page" class="btn btn-primary">Get Started</a>
      </div>

      <button id="themeToggle" class="theme-toggle">🌙</button>
    </div>
  </header>

  <!-- MAIN -->
  <main>
    <div class="layout">

      <!-- LEFT PANEL -->
      <section class="panel panel-input">

        <div class="panel-header">
          <span class="step-badge">01</span>
          <h2>Upload Resume</h2>
        </div>

        <form id="screeningForm">

          <!-- Upload -->
          <div class="field-group">
            <label class="field-label">Resume File</label>

            <div class="upload-zone" id="uploadZone">
              <input type="file" id="resumeFile" name="resume_file" class="file-input" accept=".pdf,.docx,.txt">

              <label for="resumeFile" class="upload-label">
                <span class="upload-title">Drop your resume here</span>
                <span class="upload-sub">PDF · DOCX · TXT</span>
              </label>

              <p id="fileNameDisplay" style="margin-top: 10px; color: var(--accent);" hidden></p>
            </div>
          </div>

          <!-- Paste -->
          <div class="field-group">
            <label class="field-label">Or Paste Resume</label>
            <textarea id="resumeText" name="resume_text" class="jd-textarea" placeholder="Paste resume..."></textarea>
          </div>

          <!-- Job Description -->
          <div class="field-group">
            <div class="panel-header">
              <span class="step-badge">02</span>
              <h2>Job Description</h2>
            </div>

            <textarea id="jobDescription" name="job_description" class="jd-textarea" placeholder="Paste job description..."></textarea>
          </div>

          <!-- Submit -->
          <button type="submit" class="analyze-btn" id="analyzeBtn">
            Analyze Resume →
          </button>

        </form>
      </section>

      <!-- RIGHT PANEL -->
      <section class="panel panel-results">

        <!-- Empty -->
        <div id="emptyState" class="empty-state">
          <p>Results will appear here</p>
        </div>

        <!-- Loader -->
        <div id="loader" class="loader-wrap" hidden>
          <div class="pulse-ring"></div>
          <p>Analyzing...</p>
        </div>

        <!-- Results -->
        <div id="resultsContent" hidden>

          <h2>Analysis Report</h2>

          <!-- Scores -->
          <div class="scores-row">

            <div class="score-tile">
              <h3>Match</h3>
              <span id="matchScore">0%</span>
            </div>

            <div class="score-tile">
              <h3>ATS</h3>
              <span id="atsScore">0%</span>
            </div>

            <div class="score-tile">
              <h3>Level</h3>
              <span id="matchLevel">-</span>
            </div>

          </div>

          <!-- Keywords -->
          <div class="kw-grid">
            <div>
              <h4>Matching</h4>
              <div id="matchingKeywords"></div>
            </div>

            <div>
              <h4>Missing</h4>
              <div id="missingKeywords"></div>
            </div>
          </div>

        </div>

      </section>

    </div>
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <p>Built by Suhas 🚀</p>
  </footer>

</div>

<!-- JS -->
<script>

const form = document.getElementById("screeningForm");
const loader = document.getElementById("loader");
const results = document.getElementById("resultsContent");
const empty = document.getElementById("emptyState");

// Theme
const toggle = document.getElementById("themeToggle");

if(localStorage.getItem("theme")==="light"){
  document.body.classList.add("light");
}

toggle.textContent = document.body.classList.contains("light") ? "☀️" : "🌙";

toggle.onclick = () => {
  document.body.classList.toggle("light");
  localStorage.setItem("theme", document.body.classList.contains("light") ? "light" : "dark");
  toggle.textContent = document.body.classList.contains("light") ? "☀️" : "🌙";
};

// Welcome user
const user = localStorage.getItem("user");
if(user){
  document.getElementById("welcomeUser").textContent = "Welcome, " + user;
}

// File display
document.getElementById("resumeFile").addEventListener("change", e=>{
  const fileName = e.target.files[0]?.name;
  const display = document.getElementById("fileNameDisplay");
  if (fileName) {
    display.textContent = "Selected: " + fileName;
    display.hidden = false;
  } else {
    display.hidden = true;
  }
});

// Submit
form.addEventListener("submit", async e=>{
  e.preventDefault();

  loader.hidden = false;
  empty.hidden = true;
  results.hidden = true;

  const formData = new FormData(form);

  try {
    const res = await fetch("/analyze", {
      method:"POST",
      body:formData
    });

    const data = await res.json();

    loader.hidden = true;

    if(data.error){
      alert(data.error);
      empty.hidden = false;
      return;
    }

    results.hidden = false;

    document.getElementById("matchScore").textContent = data.match_score + "%";
    document.getElementById("atsScore").textContent = data.ats_score + "%";
    document.getElementById("matchLevel").textContent = data.match_level;

    document.getElementById("matchingKeywords").innerHTML =
      data.matching_keywords.map(k=>`<span>${k}</span>`).join("");

    document.getElementById("missingKeywords").innerHTML =
      data.missing_keywords.map(k=>`<span>${k}</span>`).join("");

  } catch (err) {
    loader.hidden = true;
    empty.hidden = false;
    alert("Something went wrong: " + err.message);
  }

});

</script>

</body>
</html>
